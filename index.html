 beatz_stand:'assets/characters/beatz/beatz_stand.png',beatz_walk:'assets/characters/beatz/beatz_walk.png',beatz_punch:'assets/characters/beatz/beatz_punch.png',beatz_kick:'assets/characters/beatz/beatz_kick.png',beatz_block:'assets/characters/beatz/beatz_block.png',beatz_crouch:'assets/characters/beatz/beatz_crouch.png',beatz_special:'assets/characters/beatz/beatz_special.png',beatz_jump:'assets/characters/beatz/beatz_jump.png',

    return;

window.addEventListener('keyup',e=>setKey(e.key.toLowerCase(),false));
document.querySelectorAll('.btn').forEach(el=>{
  const combo=(el.dataset.keys||el.dataset.key||'').split(',').map(k=>k.trim()).filter(Boolean);
  const k=combo[0];
  const on=e=>{
    e.preventDefault();
    initAudio(false);
    if(gameState==='title'){handleTitleInput(e);return;}
    if(gameState==='select'){return;}
    if(gameState==='stage'){return;}
    if(gameState==='vs'){return;}
    if(gameState==='fight'&&roundOver){return;}
    if(k==='p'){paused=!paused;if(paused)pauseAllMusic();else if(!muted)playTrack(currentFightTrack());el.classList.add('pressed');setTimeout(()=>el.classList.remove('pressed'),110);return;}

    combo.forEach(key=>keys[key]=true);
    if(gameState==='fight'&&combo.includes('w')&&p1.onGround&&!p1.block&&!p1.crouch){
      const jumpDir=combo.includes('a')?-1:(combo.includes('d')?1:0);

    e.preventDefault();

});
canvas.addEventListener('pointerdown',e=>{

  else if(gameState==='vs'){handleVsPointer(e);}

  else if(gameState==='fight' && roundOver){handleFightPointer(e);}

function initAudio(startTrack=true){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(startTrack){
    if(gameState==='title') playTrack('menu');
    if(gameState==='select') playTrack('select');
    if(gameState==='stage') playTrack('stage');
    if(gameState==='vs') playTrack('vs');
    if(gameState==='fight') playTrack(currentFightTrack());
  }
}
function pauseAllMusic(){Object.values(tracks).forEach(t=>t.pause());}
function playTrack(name){
  if(muted)return;
  const next=tracks[name];
  if(!next)return;
  Object.values(tracks).forEach(t=>{if(t!==next)t.pause();});
  activeTrack=next;
  next.muted=false;
  if(next.paused)next.play().catch(()=>{});
}
function forcePlayTrack(name){
  if(muted)return;
  const next=tracks[name];
  if(!next)return;
  Object.values(tracks).forEach(t=>{if(t!==next)t.pause();});
  activeTrack=next;
  next.muted=false;
  try{next.currentTime=0;}catch(e){}
  const attempt=()=>next.play().catch(()=>{});
  attempt();
  setTimeout(()=>{if(gameState==='title'&&titleAudioReady&&!muted&&next.paused)attempt();},180);
}
function restartTrack(name){
  const t=tracks[name]; if(!t)return;
  try{t.currentTime=0;}catch(e){}
  playTrack(name);
}
function toggleMute(){
  muted=!muted;
  Object.values(tracks).forEach(t=>t.muted=muted);
  if(muted){ pauseAllMusic(); }
  else {
    if(gameState==='title') playTrack('menu');
    if(gameState==='select') playTrack('select');
    if(gameState==='stage') playTrack('stage');
    if(gameState==='vs') playTrack('vs');
    if(gameState==='fight') playTrack(currentFightTrack());
  }
}
function handleTitleInput(e){
  if(e) e.preventDefault();
  const now=performance.now();
  // Avoid double-firing on phones where touchstart, pointerdown and click can all arrive together.
  if(now<titleInputLock && titleAudioReady)return;
  initAudio(false);
  if(!titleAudioReady){
    titleAudioReady=true;
    titleInputLock=now+650;
    // Keep this direct call inside the first tap/key event so mobile browsers allow it.
    forcePlayTrack('menu');
    return;
  }
  goSelect();
}
function tone(freq,dur=0.08,type='square',vol=0.16,delay=0){
  if(muted||!audioCtx)return;
  const t=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;
  o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol*SFX_BOOST,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(t);o.stop(t+dur+0.025);
}
function noise(dur=0.08,vol=0.12,delay=0){
  if(muted||!audioCtx)return;
  const t=audioCtx.currentTime+delay;
  const buffer=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*(1-i/data.length);
  const src=audioCtx.createBufferSource();
  const g=audioCtx.createGain();
  src.buffer=buffer;g.gain.setValueAtTime(vol*SFX_BOOST,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(g);g.connect(audioCtx.destination);
  src.start(t);
}
function sfx(name){
  initAudio();

  if(name==='kick'){tone(90,.08,'sawtooth',.18);tone(155,.05,'square',.09,.02);noise(.06,.08);}
  if(name==='block'){tone(260,.045,'triangle',.12);tone(170,.06,'square',.08,.025);noise(.04,.05);}

}

function fighter(x,charId,cpu=false){const baseName=characters[charId].name;return{x,y:GROUND,vx:0,vy:0,w:78,h:172,name:cpu?'CPU '+baseName:baseName,charId,cpu,hp:100,facing:cpu?-1:1,action:'stand',timer:0,onGround:true,cool:0,specialCool:0,block:false,crouch:false,hitFlash:0,aiGuardTimer:0,aiCrouchTimer:0};}
let p1,cpu; let p1Rounds=0,cpuRounds=0,matchOver=false,roundWinnerSide=null; resetRound(false);
function resetRound(){const cpuChar=(selectedEnemy!==selectedFighter?selectedEnemy:(selectedFighter+1)%characters.length);p1=fighter(245,selectedFighter,false);cpu=fighter(720,cpuChar,true);roundTime=99;roundOver=false;winner='';paused=false;keys['f']=keys['g']=keys['h']=false;if(gameState==='fight'&&!muted){restartTrack(currentFightTrack());}}
function goSelect(){gameState='select';titleAudioReady=false;initAudio(true);restartTrack('select');}
function goStageSelect(){gameState='stage';initAudio(true);restartTrack('stage');}
function chooseRandomEnemy(){const choices=characters.map((_,i)=>i).filter(i=>i!==selectedFighter);selectedEnemy=choices[Math.floor(Math.random()*choices.length)]||((selectedFighter+1)%characters.length);}
function prepareVsScreen(){chooseRandomEnemy();gameState='vs';initAudio(true);restartTrack('vs');}
function startFight(){gameState='fight';startNewMatch();initAudio(true);restartTrack(currentFightTrack());}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function hurtBox(f){const crouch=f.action==='crouch'||f.action==='block';return{x:f.x-f.w/2,y:f.y-(crouch?118:f.h),w:f.w,h:crouch?118:f.h};}
function attackBox(f,type){const range=type==='special'?175:type==='kick'?108:86;const height=type==='kick'?58:76;const y=type==='kick'?f.y-118:f.y-142;return{x:f.facing===1?f.x+26:f.x-26-range,y,w:range,h:height};}
function intersects(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function currentFightTrack(){
  const st=stages[selectedStage];
  return (st&&st.track)||'fight';
}
function startNewMatch(){
  p1Rounds=0;
  cpuRounds=0;
  matchOver=false;
  roundWinnerSide=null;
  resetRound();
}
function finishRound(side){
  if(roundOver || matchOver) return;
  roundOver=true;
  roundWinnerSide=side;
  if(side==='p1'){
    p1Rounds++;
    winner=p1.name+' WINS THE ROUND!';
  } else {
    cpuRounds++;
    winner=cpu.name+' WINS THE ROUND!';
  }
  sfx('ko');
  keys['f']=keys['g']=keys['h']=false;
  if(p1Rounds>=2 || cpuRounds>=2){
    matchOver=true;
    winner=(p1Rounds>=2?p1.name+' WINS!':cpu.name+' WINS!');
  }
}
function handleFightConfirm(){
  if(!roundOver) return;
  if(matchOver){
    goTitle();
    return;
  }
  resetRound();
}
function goTitle(){
  gameState='title';
  paused=false;
  roundOver=false;
  matchOver=false;
  titleAudioReady=false;
  titleInputLock=0;
  keys['f']=keys['g']=keys['h']=false;
  initAudio(true);
  restartTrack('menu');
}
function doAttack(att,def,type){if(att.cool>0||roundOver)return;att.action=type;att.timer=type==='special'?34:22;att.cool=type==='special'?58:30;if(type==='special'){att.specialCool=100;sfx('special');}setTimeout(()=>{if(roundOver)return;const box=attackBox(att,type),hb=hurtBox(def);if(intersects(box,hb)){if(type==='kick'&&(def.crouch||def.action==='crouch')){sfx('block');return;}let dmg=type==='special'?16:type==='kick'?10:7;const wasBlocked=!!def.block; if(wasBlocked)dmg=Math.ceil(dmg*.25);def.hp=Math.max(0,def.hp-dmg);def.vx=att.facing*(wasBlocked?3.2:7.5);def.hitFlash=12;sfx(wasBlocked?'block':type);if(def.hp<=0){finishRound(att===p1?'p1':'cpu');}}},type==='special'?180:105);}
function update(dt){if(paused||roundOver)return;roundTime-=dt/1000;if(roundTime<=0){roundTime=0;finishRound(p1.hp>=cpu.hp?'p1':'cpu');}
[p1,cpu].forEach(f=>{if(f.cool>0)f.cool--;if(f.specialCool>0)f.specialCool--;if(f.timer>0)f.timer--;if(f.hitFlash>0)f.hitFlash--;if(f.aiGuardTimer>0)f.aiGuardTimer--;if(f.aiCrouchTimer>0)f.aiCrouchTimer--;});
// Player input
p1.block=!!keys['b'];p1.crouch=!!keys['s'];
if(p1.onGround){
  p1.vx=0;
} else {
  // Keep jump momentum after a quick diagonal tap, with slight air drift decay.
  p1.vx*=0.985;
}
if(!p1.block&&!p1.crouch){
  if(p1.onGround&&p1.timer<=0){
    if(keys['a'])p1.vx=-4.2;
    if(keys['d'])p1.vx=4.2;
  } else if(!p1.onGround){
    if(keys['a'])p1.vx=-4.2;
    if(keys['d'])p1.vx=4.2;
  }
}
if(keys['w']&&p1.onGround&&!p1.block&&!p1.crouch){
  const jumpDir=keys['a']?-1:(keys['d']?1:0);
  p1.vy=-12.5;
  if(jumpDir) p1.vx=jumpDir*5.4;
  p1.onGround=false;
  p1.action='jump';
  p1.timer=10;
}
if(keys['f'])doAttack(p1,cpu,'punch');if(keys['g'])doAttack(p1,cpu,'kick');if(keys['h']&&p1.specialCool<=0)doAttack(p1,cpu,'special');
// CPU brain - V28: tougher, but still beatable
const dist=p1.x-cpu.x;
const absDist=Math.abs(dist);
cpu.facing=dist<0?-1:1;
cpu.vx=0;
cpu.block=cpu.aiGuardTimer>0;
cpu.crouch=cpu.aiCrouchTimer>0;

const playerAttack=(p1.action==='punch'||p1.action==='kick'||p1.action==='special')&&p1.timer>0;
const close=absDist<=125;

// Small reaction chances so the CPU sometimes defends instead of just eating every hit.
// These are deliberately not 100%, otherwise it would feel psychic and annoying.
if(close&&cpu.timer<=0&&!cpu.block&&!cpu.crouch&&playerAttack){
  if(p1.action==='kick'&&Math.random()<0.020){
    cpu.aiCrouchTimer=14; // duck under some high kicks
  }else{
    const reactChance=p1.action==='special'?0.030:(p1.action==='kick'?0.018:0.014);
    if(Math.random()<reactChance)cpu.aiGuardTimer=14;
  }
}

cpu.block=cpu.aiGuardTimer>0;
cpu.crouch=cpu.aiCrouchTimer>0;

if(absDist>108&&cpu.timer<=0&&!cpu.block&&!cpu.crouch){
  cpu.vx=Math.sign(dist)*2.55;
}else if(cpu.timer<=0&&!cpu.block&&!cpu.crouch){
  if(Math.random()<0.048)doAttack(cpu,p1,Math.random()<.40?'kick':'punch');
  if(Math.random()<0.012&&cpu.specialCool<=0)doAttack(cpu,p1,'special');
  if(Math.random()<0.026)cpu.aiGuardTimer=12;
}
// face each other
if(p1.x<cpu.x){p1.facing=1;cpu.facing=-1}else{p1.facing=-1;cpu.facing=1}
[p1,cpu].forEach(f=>{f.x+=f.vx;f.y+=f.vy;if(!f.onGround)f.vy+=.68;if(f.y>=GROUND){f.y=GROUND;f.vy=0;f.onGround=true;}f.x=clamp(f.x,78,W-78);if(f.timer<=0){if(!f.onGround)f.action='jump';else if(f.block)f.action='block';else if(f.crouch)f.action='crouch';else if(Math.abs(f.vx)>0.15)f.action='walk';else f.action='stand';}});
}

  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.shadowColor='#31c8ff';ctx.shadowBlur=15;ctx.font='58px Impact';ctx.fillText('PAUSED',W/2,H/2-28);ctx.shadowBlur=0;
  drawMenuButton(W/2-165,H/2+62,330,58,'RESUME','#31c8ff');
  drawMenuButton(W/2-165,H/2+138,330,58,'RETURN TO MENU','#ff3ddb');
  ctx.restore();
}
function drawMenuButton(x,y,w,h,label,colour){
  ctx.save();ctx.textAlign='center';ctx.fillStyle='rgba(6,20,36,.94)';ctx.strokeStyle=colour;ctx.lineWidth=3;ctx.shadowColor=colour;ctx.shadowBlur=16;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font=(label.length>10?'25px Impact':'30px Impact');ctx.fillText(label,x+w/2,y+38);ctx.restore();
}

function handleFightPointer(e){
  if(!roundOver) return;
  const p=canvasPoint(e);
  const x=p.x, y=p.y;
  if(x>=W/2-170&&x<=W/2+170&&y>=H/2+118&&y<=H/2+176) handleFightConfirm();
}
function drawOverlay(){
  if(paused){drawPauseMenu();return;}
  if(roundOver){
    if(matchOver) message(winner);
    else message(winner);
    drawReturnButton(matchOver?'RETURN TO MENU':'NEXT ROUND');
  }
}
function drawReturnButton(label){
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle='rgba(6,20,36,.92)';ctx.strokeStyle=matchOver?'#ff3ddb':'#31c8ff';ctx.lineWidth=3;ctx.shadowColor=matchOver?'#ff3ddb':'#31c8ff';ctx.shadowBlur=16;
  ctx.fillRect(W/2-170,H/2+118,340,58);ctx.strokeRect(W/2-170,H/2+118,340,58);
  ctx.fillStyle='#fff';ctx.font='30px Impact';ctx.fillText(label,W/2,H/2+156);
  ctx.restore();
}
function loop(ts){if(!last)last=ts;const dt=Math.min(32,ts-last);last=ts;if(loaded<total){ctx.fillStyle='#02050b';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#31c8ff';ctx.font='30px Impact';ctx.fillText('LOADING BEATZ BRAWL V33...',W/2,H/2);requestAnimationFrame(loop);return;}document.getElementById('mobileControls').style.display=(gameState==='fight')?'block':'none';
if(gameState==='title'){drawTitle();requestAnimationFrame(loop);return;}
if(gameState==='select'){drawSelect();requestAnimationFrame(loop);return;}
if(gameState==='stage'){drawStageSelect();requestAnimationFrame(loop);return;}
if(gameState==='vs'){drawVsScreen();requestAnimationFrame(loop);return;}
update(dt);drawStage();drawFighter(cpu);drawFighter(p1);drawHUD();drawOverlay();requestAnimationFrame(loop);}requestAnimationFrame(loop);
</script>
</body>
</html>
