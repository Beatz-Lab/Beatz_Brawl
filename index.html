const TOURNAMENT_SAVE_KEY='beatzBrawlTournamentV5';
const TOURNAMENT_FIGHT_COUNT=5;
let tournament=null;
function shuffle(arr){
  const out=[...arr];
  for(let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  return out;
}
function validTournament(t){
  const fightCount=Math.min(TOURNAMENT_FIGHT_COUNT,Math.max(0,characters.length-1),stages.length);
  if(!(t&&t.active&&Number.isInteger(t.selectedFighter)&&t.selectedFighter>=0&&t.selectedFighter<characters.length&&Array.isArray(t.opponents)&&Array.isArray(t.stages)&&Number.isInteger(t.currentRound)))return false;
  if(t.opponents.length!==fightCount||t.stages.length!==fightCount||t.currentRound<0||t.currentRound>=fightCount)return false;
  const opponentsValid=t.opponents.every(i=>Number.isInteger(i)&&i>=0&&i<characters.length&&i!==t.selectedFighter);
  const stagesValid=t.stages.every(i=>Number.isInteger(i)&&i>=0&&i<stages.length);
  const outfitValid=t.selectedOutfit===undefined||t.selectedOutfit==='classic'||t.selectedOutfit==='poms';
  return opponentsValid&&stagesValid&&outfitValid&&new Set(t.opponents).size===t.opponents.length&&new Set(t.stages).size===t.stages.length;
}
function loadTournament(){
  try{const t=JSON.parse(localStorage.getItem(TOURNAMENT_SAVE_KEY)||'null');return validTournament(t)?t:null;}catch(e){return null;}
}
function saveTournament(){
  if(tournament&&tournament.active){try{localStorage.setItem(TOURNAMENT_SAVE_KEY,JSON.stringify(tournament));}catch(e){}}
}
function clearTournament(){
  tournament=null;
  try{localStorage.removeItem(TOURNAMENT_SAVE_KEY);}catch(e){}
}
function buildTournament(){
  const opponents=shuffle(characters.map((_,i)=>i).filter(i=>i!==selectedFighter));
  const stageOrder=shuffle(stages.map((_,i)=>i));
  const fightCount=Math.min(TOURNAMENT_FIGHT_COUNT,characters.length-1,stages.length);
  tournament={active:true,selectedFighter,selectedOutfit:selectedFighter===AIMEE_INDEX?selectedAimeeOutfit:'classic',opponents:opponents.slice(0,fightCount),stages:stageOrder.slice(0,fightCount),currentRound:0};
  saveTournament();
  openTournamentLadder();
}
function continueTournament(){
  const saved=loadTournament();
  if(!saved)return;
  tournament=saved;currentMode='tournament';selectedFighter=tournament.selectedFighter;
  selectedAimeeOutfit=tournament.selectedOutfit||'classic';
  selectedOutfitOption=selectedAimeeOutfit==='poms'?1:0;
  openTournamentLadder();
}
function openTournamentLadder(){
  if(!validTournament(tournament)){goModeMenu();return;}
  selectedFighter=tournament.selectedFighter;
  selectedAimeeOutfit=tournament.selectedOutfit||'classic';
  selectedOutfitOption=selectedAimeeOutfit==='poms'?1:0;
  selectedEnemy=tournament.opponents[tournament.currentRound];
  selectedStage=tournament.stages[tournament.currentRound];
  gameState='tournamentLadder';
  initAudio(true);restartTrack('vs');
}
function charAsset(f,action){
  const ch=characters[f.charId];
  const prefix=(ch.id==='aimee'&&f.outfit==='poms')?'aimee_poms':ch.assetPrefix;
  return assets[prefix+'_'+action]||assets[prefix+'_stand'];
}
function characterStandAsset(charIndex,playerControlled=false){
  const ch=characters[charIndex];
  const prefix=(playerControlled&&ch.id==='aimee'&&selectedAimeeOutfit==='poms')?'aimee_poms':ch.assetPrefix;
  return assets[prefix+'_stand'];
}

function setKey(k,val){keys[k]=val;}
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(gameState==='title'){
    if(k==='m'){initAudio(false);toggleMute();e.preventDefault();return;}
    handleTitleInput(e);
    return;
  }
  initAudio(false);
  if(gameState==='mode'){
    if(k==='1'||k==='p'){startPracticeMode();e.preventDefault();return;}
    if(k==='2'||k==='q'){startQuickMatch();e.preventDefault();return;}
    if(k==='3'||k==='t'){openTournamentModeChoice();e.preventDefault();return;}
    if(k==='escape'||k==='backspace'){gameState='title';e.preventDefault();return;}
    return;
  }
  if(gameState==='tournamentChoice'){
    if(k==='escape'||k==='backspace'){goModeMenu();e.preventDefault();return;}
    if(k==='1'||k==='c'){continueTournament();e.preventDefault();return;}
    if(k==='2'||k==='n'){requestNewTournament();e.preventDefault();return;}
    return;
  }

function tone(freq,dur=0.08,type='square',vol=0.16,delay=0){

  g.gain.exponentialRampToValueAtTime(vol*SFX_BOOST,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);

    ctx.arc(blastX,blastY,40*pulse,0,Math.PI*2);
    ctx.fill();

    // Small bright core.
    ctx.shadowColor='#31c8ff';
    ctx.shadowBlur=18;
    ctx.fillStyle='rgba(235,252,255,.98)';
    ctx.beginPath();
    ctx.arc(blastX,blastY,10*pulse,0,Math.PI*2);
    ctx.fill();

    // Animated blue music notes orbiting around the blast.
    const notes=['♪','♫','♬','♪','♫','♪','♬'];
    ctx.textAlign='center';
    ctx.textBaseline='middle';

    for(let i=0;i<notes.length;i++){
      const angle=now/340+i*(Math.PI*2/notes.length);
      const radius=50+(i%3)*12;
      const nx=clamp(blastX+Math.cos(angle)*radius,24,W-24);
      const ny=clamp(blastY+Math.sin(angle)*radius*.7,24,H-24);
      const size=20+(i%3)*4;

      ctx.font='bold '+size+'px Arial';
      ctx.shadowColor=i%2?'#31c8ff':'#006cff';
      ctx.shadowBlur=14;
      ctx.fillStyle=i%2
        ?'rgba(175,235,255,.98)'
        :'rgba(49,200,255,.98)';
      ctx.fillText(notes[i],nx,ny);
    }

    // Restrained blue sparkles moving with the notes.
    for(let i=0;i<9;i++){
      const angle=-now/430+i*(Math.PI*2/9);
      const radius=28+(i%4)*9;
      const sx=clamp(blastX+Math.cos(angle)*radius,14,W-14);
      const sy=clamp(blastY+Math.sin(angle)*radius*.72,14,H-14);

      ctx.shadowColor='#31c8ff';
      ctx.shadowBlur=9;
      ctx.fillStyle=i%2
        ?'rgba(255,255,255,.94)'
        :'rgba(68,190,255,.92)';
      ctx.beginPath();
      ctx.arc(sx,sy,2+(i%2),0,Math.PI*2);
      ctx.fill();
    }
  }else{
    // Fallback for any future effect type.
    ctx.fillStyle='rgba(49,200,255,.85)';
    ctx.shadowColor='#31c8ff';
    ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.arc(x,y,18,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawWrappedText(text,x,y,maxWidth,lineHeight,maxLines=2){
  const words=text.split(/\s+/);let line='',lines=[];
  for(const word of words){
    const test=line?line+' '+word:word;
    if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=word;}
    else line=test;
  }
  if(line)lines.push(line);
  lines.slice(0,maxLines).forEach((part,i)=>ctx.fillText(part,x,y+i*lineHeight));
}

  for(let i=0;i<scenes.length;i++){
    ctx.beginPath();ctx.arc(W/2+(i-(scenes.length-1)/2)*22,518,5,0,Math.PI*2);
    ctx.fillStyle=i===endingSceneIndex?'#ffe35a':'rgba(255,255,255,.35)';ctx.fill();
  }
  ctx.restore();
}
function handleTournamentEndingPointer(e){
  const p=canvasPoint(e),scenes=activeTournamentEnding();
  if(!scenes)return;
  if(p.x>=24&&p.x<=180&&p.y>=490&&p.y<=540&&endingSceneIndex>0){previousTournamentEnding();return;}
  if(p.x>=W-270&&p.x<=W&&p.y>=420&&p.y<=540){advanceTournamentEnding();return;}
  // Tapping the artwork also advances, which feels natural on phones and tablets.
  advanceTournamentEnding();
}
function drawTournamentEnd(win){
  if(assets.title&&assets.title.width)ctx.drawImage(assets.title,0,0,W,H);else drawStage();
  ctx.save();ctx.fillStyle='rgba(0,0,0,.76)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  const ch=characters[selectedFighter],img=assets[ch.assetPrefix+'_stand'];
  ctx.fillStyle=win?'#ffe35a':'#ff3ddb';ctx.shadowColor=win?'#41ff6b':'#ff3ddb';ctx.shadowBlur=22;ctx.font='65px Impact';ctx.fillText(win?'TOURNAMENT CHAMPION!':'TOURNAMENT OVER',W/2,105);ctx.shadowBlur=0;
  if(img&&img.width){const th=230,sc=th/img.height,dw=img.width*sc;ctx.drawImage(img,W/2-dw/2,125,dw,th);}
  ctx.fillStyle='#fff';ctx.font='46px Impact';ctx.fillText(win?ch.name+' WINS!':'BETTER LUCK NEXT TIME',W/2,405);
  if(!win){ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='17px Arial';ctx.fillText('Your saved ladder is still available from the menu.',W/2,435);}
  drawMenuButton(W/2-170,455,340,58,'RETURN TO MENU',win?'#41ff6b':'#31c8ff');
  ctx.restore();
}
function handleTournamentEndPointer(e){const p=canvasPoint(e);if(p.x>=W/2-170&&p.x<=W/2+170&&p.y>=455&&p.y<=513)goTitle();}
function handlePausePointer(e){
  const p=canvasPoint(e);
  const x=p.x, y=p.y;
  if(x>=W/2-165&&x<=W/2+165&&y>=H/2+62&&y<=H/2+120){paused=false;if(!muted)playTrack(currentFightTrack());return;}
  if(x>=W/2-165&&x<=W/2+165&&y>=H/2+138&&y<=H/2+196){goTitle();return;}
}
function drawPauseMenu(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.shadowColor='#31c8ff';ctx.shadowBlur=15;ctx.font='58px Impact';ctx.fillText('PAUSED',W/2,H/2-28);ctx.shadowBlur=0;
  drawMenuButton(W/2-165,H/2+62,330,58,'RESUME','#31c8ff');
  drawMenuButton(W/2-165,H/2+138,330,58,'RETURN TO MENU','#ff3ddb');
  ctx.restore();
}
function drawMenuButton(x,y,w,h,label,colour){
  ctx.save();ctx.textAlign='center';ctx.fillStyle='rgba(6,20,36,.94)';ctx.strokeStyle=colour;ctx.lineWidth=3;ctx.shadowColor=colour;ctx.shadowBlur=16;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font=(label.length>10?'25px Impact':'30px Impact');ctx.fillText(label,x+w/2,y+38);ctx.restore();
}

function handleFightPointer(e){
  if(!roundOver) return;
  const p=canvasPoint(e);
  const x=p.x, y=p.y;
  if(x>=W/2-170&&x<=W/2+170&&y>=H/2+118&&y<=H/2+176) handleFightConfirm();
}
function drawOverlay(){
  if(paused){drawPauseMenu();return;}
  if(roundOver){
    if(matchOver) message(winner);
    else message(winner);
    drawReturnButton(matchOver?(currentMode==='tournament'?(p1Rounds>=2?'CONTINUE':'TOURNAMENT OVER'):'RETURN TO MENU'):'NEXT ROUND');
  }
}
function drawReturnButton(label){
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle='rgba(6,20,36,.92)';ctx.strokeStyle=matchOver?'#ff3ddb':'#31c8ff';ctx.lineWidth=3;ctx.shadowColor=matchOver?'#ff3ddb':'#31c8ff';ctx.shadowBlur=16;
  ctx.fillRect(W/2-170,H/2+118,340,58);ctx.strokeRect(W/2-170,H/2+118,340,58);
  ctx.fillStyle='#fff';ctx.font='30px Impact';ctx.fillText(label,W/2,H/2+156);
  ctx.restore();
}
function loop(ts){pollEndingGamepad();if(!last)last=ts;const dt=Math.min(32,ts-last);last=ts;if(loaded<total){ctx.fillStyle='#02050b';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#31c8ff';ctx.font='30px Impact';ctx.fillText('LOADING BEATZ BRAWL V96...',W/2,H/2);requestAnimationFrame(loop);return;}document.getElementById('mobileControls').style.display=(gameState==='fight')?'block':'none';
if(gameState==='title'){drawTitle();requestAnimationFrame(loop);return;}
if(gameState==='mode'){drawModeScreen();requestAnimationFrame(loop);return;}
if(gameState==='tournamentChoice'){drawTournamentChoice();requestAnimationFrame(loop);return;}
if(gameState==='confirmNew'){drawConfirmNew();requestAnimationFrame(loop);return;}
if(gameState==='select'){drawSelect();requestAnimationFrame(loop);return;}
if(gameState==='outfit'){drawAimeeOutfitSelect();requestAnimationFrame(loop);return;}
if(gameState==='stage'){drawStageSelect();requestAnimationFrame(loop);return;}
if(gameState==='vs'){drawVsScreen();requestAnimationFrame(loop);return;}
if(gameState==='tournamentLadder'){drawTournamentLadder();requestAnimationFrame(loop);return;}
if(gameState==='tournamentEnding'){drawTournamentEnding();requestAnimationFrame(loop);return;}
if(gameState==='tournamentWin'){drawTournamentEnd(true);requestAnimationFrame(loop);return;}
if(gameState==='tournamentOver'){drawTournamentEnd(false);requestAnimationFrame(loop);return;}
update(dt);drawStage();if(currentMode==='practice')drawPracticeDummy(cpu);else drawFighter(cpu);drawFighter(p1);drawHUD();drawOverlay();requestAnimationFrame(loop);}requestAnimationFrame(loop);
</script>
